name: Tauri Bundles

on:
  push:
    paths:
      - 'crates/**'
      - 'src-tauri/**'
      - 'ui/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tauri-bundles.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'src-tauri/**'
      - 'ui/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tauri-bundles.yml'

jobs:
  macos:
    name: macOS app and DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.1 --locked

      - name: Locked Rust dependency preflight
        run: cargo metadata --locked --format-version 1 >/dev/null

      - name: Build macOS bundles
        env:
          CI: true
        run: cargo tauri build --bundles app,dmg -- --locked

      - name: Verify macOS artifacts
        run: |
          test -d target/release/bundle/macos/ChickenScratch.app
          test -n "$(find target/release/bundle/dmg -name 'ChickenScratch_*.dmg' -print -quit)"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chickenscratch-macos
          path: |
            target/release/bundle/macos/ChickenScratch.app
            target/release/bundle/dmg/*.dmg

  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.1 --locked

      - name: Locked Rust dependency preflight
        run: cargo metadata --locked --format-version 1 >/dev/null

      - name: Build Linux AppImage
        run: cargo tauri build --bundles appimage -- --locked

      - name: Verify Linux artifact
        run: test -n "$(find target/release/bundle/appimage -name '*.AppImage' -print -quit)"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: chickenscratch-linux-appimage
          path: target/release/bundle/appimage/*.AppImage
