name: Windows (WinUI 3)

on:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - 'windows/**'
      - '.github/workflows/windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: windows
        run: dotnet restore ChickenScratch.slnx

      - name: Build
        working-directory: windows
        run: dotnet build ChickenScratch.slnx /p:Configuration=Release --no-restore

      - name: Build Core test harnesses
        working-directory: windows
        run: |
          dotnet build ChickenScratch.Core.Tests/GitServiceRestoreHarness/ChickenScratch.Core.GitServiceRestoreHarness.csproj /p:Configuration=Release --no-restore
          dotnet build ChickenScratch.Core.Tests/CrossFrontendHarness/ChickenScratch.Core.CrossFrontendHarness.csproj /p:Configuration=Release --no-restore
