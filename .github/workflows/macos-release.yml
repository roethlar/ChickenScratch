name: macOS Signed Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-signed:
    name: Signed and notarized macOS app and DMG
    runs-on: macos-latest
    environment:
      name: release-macos

    steps:
      - uses: actions/checkout@v4

      - name: Require signing and notarization secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8 \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing macOS release secret::$name is required for signed and notarized macOS releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.1 --locked

      - name: Locked Rust dependency preflight
        run: cargo metadata --locked --format-version 1 >/dev/null

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate="$RUNNER_TEMP/developer-id.p12"
          keychain="$RUNNER_TEMP/chickenscratch-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain"
          security find-identity -v -p codesigning "$keychain"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          key_dir="$RUNNER_TEMP/private_keys"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY}.p8"
          mkdir -p "$key_dir"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build signed and notarized macOS bundles
        env:
          CI: true
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: cargo tauri build --bundles app,dmg -- --locked

      - name: Notarize and staple DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          dmg="$(find target/release/bundle/dmg -name 'ChickenScratch_*.dmg' -print -quit)"

          test -n "$dmg"
          test -f "$dmg"

          xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg"

      - name: Verify signed and notarized macOS artifacts
        run: |
          app="target/release/bundle/macos/ChickenScratch.app"
          dmg="$(find target/release/bundle/dmg -name 'ChickenScratch_*.dmg' -print -quit)"

          test -d "$app"
          test -n "$dmg"
          test -f "$dmg"

          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | tee /tmp/chickenscratch-codesign.txt
          grep 'Authority=Developer ID Application' /tmp/chickenscratch-codesign.txt

          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chickenscratch-macos-signed-notarized
          path: |
            target/release/bundle/macos/ChickenScratch.app
            target/release/bundle/dmg/*.dmg
