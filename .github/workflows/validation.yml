name: Validation

on:
  push:
  pull_request:

jobs:
  validate:
    name: Rust, UI, and format harness
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Release metadata
        run: scripts/check-release-metadata.sh

      - name: Rust clippy
        run: cargo clippy --locked -p chickenscratch-core -p chickenscratch -p chickenscratch-tui -p chikn-converter --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --locked -p chickenscratch-core -p chickenscratch -p chickenscratch-tui -p chikn-converter --lib --bins --tests

      - name: UI lint
        run: npm run lint
        working-directory: ui

      - name: UI build
        run: npm run build
        working-directory: ui

      - name: Cross-frontend harness
        env:
          CHIKN_CROSS_FRONTEND_WORKDIR: ${{ runner.temp }}/chikn-cross-frontend
          CHIKN_CROSS_FRONTEND_FAIL_ON_REPAIR: "1"
        run: |
          rm -rf "$CHIKN_CROSS_FRONTEND_WORKDIR"
          crates/core/tests/cross_frontend/run.sh
          grep -q 'writer-toolchains-ran:2/2' "$CHIKN_CROSS_FRONTEND_WORKDIR/manifest.txt"
