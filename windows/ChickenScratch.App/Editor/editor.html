<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e2e;
    --fg: #cdd6f4;
    --selection: #45475a;
    --caret: #cba6f7;
    --para-spacing: 0.75em;
    --font-family: 'Segoe UI Variable', 'Georgia', serif;
    --font-size: 16px;
    --line-height: 1.8;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-family);
    font-size: var(--font-size);
    line-height: var(--line-height);
    padding: 2rem 3rem;
    max-width: 780px;
    margin: 0 auto;
    min-height: 100vh;
  }

  body.theme-light {
    --bg: #fafaf8;
    --fg: #1c1c1e;
    --selection: #d1d5db;
    --caret: #6d28d9;
  }

  body.theme-sepia {
    --bg: #f5f0e8;
    --fg: #3d2b1f;
    --selection: #d9c9b4;
    --caret: #8b4513;
  }

  body.paragraph-indent p { text-indent: 1.5em; margin-top: 0; }
  body.paragraph-block p { margin-top: var(--para-spacing); }

  .ProseMirror {
    outline: none;
    min-height: calc(100vh - 4rem);
  }

  .ProseMirror p.is-editor-empty:first-child::before {
    content: attr(data-placeholder);
    color: #6c7086;
    pointer-events: none;
    position: absolute;
  }

  .ProseMirror h1 { font-size: 1.8em; font-weight: 700; margin: 0.5em 0; }
  .ProseMirror h2 { font-size: 1.4em; font-weight: 600; margin: 0.5em 0; }
  .ProseMirror h3 { font-size: 1.2em; font-weight: 600; margin: 0.5em 0; }

  ::selection { background: var(--selection); }

  .ProseMirror-focused { caret-color: var(--caret); }

  mark { background: rgba(203,166,247,0.3); border-radius: 2px; }
</style>
</head>
<body class="paragraph-block">
<div id="editor"></div>

<script type="module">
import { Editor } from 'https://esm.sh/@tiptap/core@2.10.4';
import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.10.4';
import Underline from 'https://esm.sh/@tiptap/extension-underline@2.10.4';
import Highlight from 'https://esm.sh/@tiptap/extension-highlight@2.10.4';
import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2.10.4';
import { Markdown } from 'https://esm.sh/tiptap-markdown@0.9.0';

let debounceTimer = null;

const editor = new Editor({
  element: document.getElementById('editor'),
  extensions: [
    StarterKit,
    Underline,
    Highlight,
    Placeholder.configure({ placeholder: 'Start writing…' }),
    Markdown.configure({
      html: true,
      tightLists: true,
      bulletListMarker: '-',
      linkify: false,
      breaks: false,
      transformPastedText: false,
      transformCopiedText: false,
    }),
  ],
  content: '',
  onUpdate({ editor }) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const markdown = editor.storage.markdown.getMarkdown();
      const text = editor.getText();
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      postToHost({ type: 'contentChanged', content: markdown });
      postToHost({ type: 'wordCount', count: words });
    }, 300);
  },
  onSelectionUpdate({ editor }) {
    postToHost({
      type: 'selectionFormat',
      bold: editor.isActive('bold'),
      italic: editor.isActive('italic'),
      underline: editor.isActive('underline'),
      heading1: editor.isActive('heading', { level: 1 }),
      heading2: editor.isActive('heading', { level: 2 }),
      heading3: editor.isActive('heading', { level: 3 }),
    });
  },
});

function postToHost(msg) {
  if (window.chrome?.webview) {
    window.chrome.webview.postMessage(JSON.stringify(msg));
  }
}

// Public API called by C# host
window.editorApi = {
  setContent(markdown) { editor.commands.setContent(markdown, false); },
  getContent() { return editor.storage.markdown.getMarkdown(); },
  setEditable(val) { editor.setEditable(val); },
  setTheme(theme) {
    document.body.className = document.body.className.replace(/theme-\S+/, '').trim();
    document.body.classList.add('theme-' + theme);
  },
  setParagraphStyle(style) {
    document.body.classList.toggle('paragraph-indent', style === 'indent');
    document.body.classList.toggle('paragraph-block', style !== 'indent');
  },
  setFont(family, sizePx) {
    document.documentElement.style.setProperty('--font-family', `'${family}', Georgia, serif`);
    document.documentElement.style.setProperty('--font-size', sizePx + 'px');
  },
  bold() { editor.chain().focus().toggleBold().run(); },
  italic() { editor.chain().focus().toggleItalic().run(); },
  underline() { editor.chain().focus().toggleUnderline().run(); },
  heading(level) { editor.chain().focus().toggleHeading({ level }).run(); },
  undo() { editor.chain().focus().undo().run(); },
  redo() { editor.chain().focus().redo().run(); },
  find(query) {
    const text = editor.getText();
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    postToHost({ type: 'findResult', found: idx >= 0 });
  },
};

// Receive messages from C# host
window.chrome?.webview?.addEventListener('message', (event) => {
  try {
    const msg = JSON.parse(event.data);
    if (msg.command && window.editorApi[msg.command]) {
      window.editorApi[msg.command](...(msg.args ?? []));
    }
  } catch {}
});
</script>
</body>
</html>
